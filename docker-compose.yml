version: '3.8'

services:
  app:
    build: .
    image: blactify-app:latest
    restart: always
    environment:
      - NODE_ENV=production
    env_file:
      - .env.local
    expose:
      - 3000

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
